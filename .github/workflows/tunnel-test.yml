name: Cloudflare Tunnel Test

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared-linux-amd64
          sudo mv cloudflared-linux-amd64 /usr/local/bin/cloudflared

      - name: 🌐 Проверка YouTube через туннель
        run: |
          echo "🌐 Проверяем YouTube через Cloudflare Tunnel..."
          curl -s -o /dev/null -w "YouTube через туннель: %{http_code}\n" https://www.youtube.com

      - name: 📊 Проверка IP через туннель
        run: |
          echo "🌍 IP через туннель:"
          curl -s https://api.ipify.org

      - name: 📨 Отправка в Telegram
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🔄 Cloudflare Tunnel тест завершён!%0A📊 Смотреть: https://github.com/k0sm0xyz/sistemny-analitik-portfolio/actions"
