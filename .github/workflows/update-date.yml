name: Update date in portfolio

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Update dates in all markdown files
        run: |
          DATE=$(date '+%Y-%m-%d %H:%M:%S')
          find . -name "*.md" -type f | while read file; do
            sed -i "s/Последний запуск:.*/Последний запуск: $DATE/" "$file"
            sed -i "s/Последнее обновление:.*/Последнее обновление: $DATE/" "$file"
            sed -i "s/Обновлено:.*/Обновлено: $DATE/" "$file"
          done

      - name: Commit and push
        run: |
          git config user.name "k0sm0xyz"
          git config user.email "giopt097@gmail.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/k0sm0xyz/sistemny-analitik-portfolio.git
          git add .
          git commit -m "🔄 Auto-update dates: $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push
