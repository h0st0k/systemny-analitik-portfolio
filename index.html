<!DOCTYPE html>
<html>
<head>
    <title>Портфолио аналитика</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
            background: #f9f9f9;
        }
        h1 {
            color: #E74C3C;
            border-bottom: 4px solid #F1C40F;
            padding-bottom: 10px;
        }
        .green { color: #2ECC71; font-weight: bold; }
        .yellow { color: #F1C40F; font-weight: bold; }
        .red { color: #E74C3C; font-weight: bold; }
        ul { list-style: none; padding: 0; }
        li { margin: 12px 0; }
        a {
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: 0.3s;
        }
        a.green-link { color: #2ECC71; border: 2px solid #2ECC71; }
        a.green-link:hover { background: #2ECC71; color: white; }
        a.yellow-link { color: #F1C40F; border: 2px solid #F1C40F; }
        a.yellow-link:hover { background: #F1C40F; color: white; }
        a.red-link { color: #E74C3C; border: 2px solid #E74C3C; }
        a.red-link:hover { background: #E74C3C; color: white; }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #F1C40F;
            font-size: 14px;
            color: #888;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: white;
            margin-right: 8px;
        }
        .badge-green { background: #2ECC71; }
        .badge-yellow { background: #F1C40F; color: #333; }
        .badge-red { background: #E74C3C; }
    </style>
</head>
<body>
    <h1>🔴🟡🟢 Портфолио аналитика</h1>
    <p>Привет! Я учусь на системного аналитика и собираю свои проекты.</p>

    <ul>
        <li><a class="green-link" href="dashboard.md">📋 Дашборд доступности</a> <span class="badge badge-green">ONLINE</span></li>
        <li><a class="yellow-link" href="tests.md">✅ Результаты тестов</a> <span class="badge badge-yellow">В процессе</span></li>
        <li><a class="red-link" href="README.md">📖 О проекте</a> <span class="badge badge-red">Обновлено</span></li>
        <li><a class="green-link" href="exports/">📦 Экспортированные данные</a></li>
    </ul>

    <p>🔗 <a href="https://github.com/k0sm0xyz/sistemny-analitik-portfolio">GitHub</a></p>

    <div class="footer">
        🔴🟡🟢 Автоматически обновляется через GitHub Actions &bull; 25.06.2026
    </div>

</html>
